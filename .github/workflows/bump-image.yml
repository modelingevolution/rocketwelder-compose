# Runner: ubuntu-latest — public repo, no Docker/ACR needed.
name: Bump RocketWelder Image

on:
  repository_dispatch:
    types: [rw2-released]

concurrency:
  group: compose-bump
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image version, bump compose tag, commit & push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -e
          [ -z "$VERSION" ] && { echo "No version in payload"; exit 1; }

          ./update-version.sh set "$VERSION" --format=json

          CLATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | sed 's/^v//')
          CLATEST=${CLATEST:-0.0.0}
          IFS=. read -r MA MI PA <<< "$CLATEST"
          CNEW="$MA.$MI.$((PA+1))"

          git config user.name  "rocketwelder-release"
          git config user.email "release@modelingevolution.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version change — nothing to release."
          else
            git commit -m "Release v$CNEW (image $VERSION)"
            git push origin HEAD:master
            git tag "v$CNEW"
            git push origin "v$CNEW"
          fi
