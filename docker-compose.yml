name: rocket-welder
services:
  modelingevolution.rocketwelder:
    image: docker.modelingevolution.com/rocketwelder/rocketwelder:2.12.15
    container_name: app
    privileged: true
    user: root
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      eventstore.db:
        condition: service_healthy
    environment:
      - UDEV=1
      - DisableNetworkManager=true
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - ASPNETCORE_ENVIRONMENT=Production
      - GStreamer__PluginPath=/plugins:/usr/local/lib/x86_64-linux-gnu/gstreamer-1.0
      - FsRoot=/fsroot
      - RecordingsPath=/app/wwwroot/rec
      - TempRecordingsPath=/temp-recordings
      - EventStore=esdb://127.0.0.1:2113?tls=false&tlsVerifyCert=false
      - RepositoryStoragePaths=/repositories
      - Docker__HostingContainerName=app
    volumes:
      - "/dev:/dev"
      - "/tmp:/tmp"
      - "/dev/shm:/dev/shm"
      - "/var/data/rocketwelder/app/recordings:/app/wwwroot/rec"
      - "/var/data/rocketwelder/app/temp-recordings:/temp-recordings"
      - "/var/docker/data/app/fs:/fsroot"
      - "/var/docker/data/app/logs:/app/logs"
      - "/var/docker/data/app/models:/app/models"
      - "/var/docker/data/app/appsettings.runtime.json:/app/appsettings.runtime.json"
      - "/var/docker/data/app/repositories:/repositories"
      - "/var/docker/data/app/calibration:/var/docker/data/rocketwelder/app/calibration"
      - "/run/udev:/run/udev:ro"
      - "/var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/etc/machine-id:/etc/machine-id"
      # epic-035 iter-4b (FR-5.3, FR-5.4, FR-5.5, FR-6.1, FR-6.3) — AI Chat system
      # prompt and any future Claude personas are version-controlled here in
      # rocketwelder-compose and bind-mounted read-only into the welder container.
      # The host code's PromptLoader (RocketWelder:Prompts:Path = /prompts default)
      # picks up edits via FileSystemWatcher; restart the welder to apply changes
      # to the AI Chat system prompt (ChatProcessor caches it at construction).
      - "./prompts:/prompts:ro"
    ports:
      - "80:80"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "10"
   
  eventstore.db:
    # KurrentDB (formerly EventStoreDB). KurrentDB reads the existing EventStoreDB /
    # earlier-KurrentDB data directory in place — no chunk/index conversion.
    image: kurrentplatform/kurrentdb:26.1.0
    container_name: eventstore
    restart: unless-stopped
    user: root
    environment:
      - KURRENTDB_RUN_PROJECTIONS=All
      - KURRENTDB_START_STANDARD_PROJECTIONS=true
      - KURRENTDB_INSECURE=true
      - KURRENTDB_ENABLE_ATOM_PUB_OVER_HTTP=true
    ports:
      - "127.0.0.1:2113:2113"
    volumes:
      # Host paths unchanged (backup scripts reference them). Container targets
      # are KurrentDB's native paths — the existing EventStoreDB chunk files are
      # read in place (verified compatible: ESDB 24.10 -> KurrentDB 25).
      - /var/docker/data/eventstore/data:/var/lib/kurrentdb
      - /var/docker/data/eventstore/logs:/var/log/kurrentdb
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2113/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "10"